<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paste Image Demo - Analytics Approach</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f172a;
            color: #e2e8f0;
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h2 {
            color: #a855f7;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        .subtitle {
            color: rgba(168, 85, 247, 0.5);
            font-size: 0.75rem;
            margin-bottom: 1rem;
        }

        /* ===== SPLIT CONTAINER ===== */
        .split-container {
            display: flex;
            flex-direction: row;
            width: 1000px;
            height: 500px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        /* ===== LEFT: Image paste area ===== */
        .image-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            border-right: 1px solid rgba(168, 85, 247, 0.25);
        }
        .side-label {
            padding: 0.5rem 0.75rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: rgba(168, 85, 247, 0.1);
            border-bottom: 1px solid rgba(168, 85, 247, 0.15);
        }
        .side-label.purple { color: #a855f7; }
        .side-label.cyan { color: #22d3ee; }

        .image-paste-zone {
            flex: 1;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.75rem;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.5) 0%, rgba(15, 23, 42, 0.3) 100%);
            align-items: flex-start;
            align-content: flex-start;
            overflow-y: auto;
            outline: none;
            cursor: pointer;
            scrollbar-width: thin;
            scrollbar-color: rgba(168, 85, 247, 0.3) transparent;
        }
        .image-paste-zone::-webkit-scrollbar { width: 5px; }
        .image-paste-zone::-webkit-scrollbar-thumb {
            background: rgba(168, 85, 247, 0.3);
            border-radius: 3px;
        }
        .image-paste-zone:focus {
            background: linear-gradient(180deg, rgba(168, 85, 247, 0.08) 0%, rgba(15, 23, 42, 0.4) 100%);
            box-shadow: inset 0 0 30px rgba(168, 85, 247, 0.05);
        }

        .paste-hint {
            width: 100%;
            text-align: center;
            color: rgba(168, 85, 247, 0.35);
            font-size: 0.75rem;
            padding: 3rem 1rem;
            user-select: none;
            pointer-events: none;
        }
        .paste-hint span {
            display: block;
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        /* ===== IMAGE ITEM (same approach as analytics) ===== */
        .image-preview-item {
            position: relative;
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(168, 85, 247, 0.2);
            background: rgba(0, 0, 0, 0.3);
            transition: all 0.2s ease;
        }
        .image-preview-item:hover {
            border-color: rgba(168, 85, 247, 0.5);
            box-shadow: 0 0 10px rgba(168, 85, 247, 0.15);
        }
        .image-preview-item img {
            max-width: 100%;
            max-height: 220px;
            width: 100%;
            display: block;
            object-fit: contain;
            border-radius: 4px;
        }
        .image-preview-item .remove-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 20px;
            height: 20px;
            background: rgba(239, 68, 68, 0.85);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 0.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .image-preview-item:hover .remove-btn {
            opacity: 1;
        }

        /* ===== RIGHT: Code output area ===== */
        .code-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .code-side textarea {
            flex: 1;
            width: 100%;
            background: rgba(15, 23, 42, 0.9);
            color: #67e8f9;
            border: none;
            padding: 0.75rem;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 0.72rem;
            line-height: 1.5;
            resize: none;
            outline: none;
        }

        /* ===== CLEAR BUTTON ===== */
        .clear-btn {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.5rem 1.2rem;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.8), rgba(220, 38, 38, 0.9));
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 8px;
            color: white;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .clear-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <h2>Paste Image Demo</h2>
    <p class="subtitle">Click the left side, then Ctrl+V to paste an image. The HTML code appears on the right.</p>

    <div class="split-container">

        <!-- LEFT: Paste images here (visual preview) -->
        <div class="image-side">
            <div class="side-label purple">&#x1F5BC; Image Preview (paste here)</div>
            <div class="image-paste-zone" id="imagePasteZone" tabindex="0">
                <div class="paste-hint" id="pasteHint">
                    <span>&#x1F4CB;</span>
                    Click here, then Ctrl+V to paste an image
                </div>
            </div>
        </div>

        <!-- RIGHT: Auto-generated HTML code -->
        <div class="code-side">
            <div class="side-label cyan">&#x2728; Generated HTML Code</div>
            <textarea id="codeOutput" readonly placeholder="The HTML code for each pasted image will appear here automatically..."></textarea>
        </div>

    </div>

    <button class="clear-btn" onclick="clearAll()">Clear All</button>

    <script>
        const pasteZone = document.getElementById('imagePasteZone');
        const codeOutput = document.getElementById('codeOutput');
        const pasteHint = document.getElementById('pasteHint');

        // Store all generated code snippets
        let codeSnippets = [];

        // Listen for paste on the image zone
        pasteZone.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            if (!items) return;

            for (let i = 0; i < items.length; i++) {
                if (items[i].type.startsWith('image/')) {
                    e.preventDefault();
                    const blob = items[i].getAsFile();
                    if (!blob) return;

                    const reader = new FileReader();
                    reader.onloadend = function() {
                        const base64 = reader.result;

                        // 1) Show image visually on the left side
                        addImageToPreview(base64);

                        // 2) Generate the HTML code and show it on the right side
                        const htmlCode = '<img src="' + base64 + '" alt="pasted image" style="max-width:100%; height:auto;" />';
                        codeSnippets.push(htmlCode);
                        updateCodeOutput();
                    };
                    reader.readAsDataURL(blob);
                    return;
                }
            }
        });

        // Add image visually to the left panel
        function addImageToPreview(base64DataUrl) {
            if (pasteHint) pasteHint.style.display = 'none';

            const idx = codeSnippets.length; // will be the index after push

            const item = document.createElement('div');
            item.className = 'image-preview-item';
            item.dataset.index = idx;
            item.innerHTML =
                '<img src="' + base64DataUrl + '" alt="pasted image" />' +
                '<button class="remove-btn" title="Remove image" onclick="removeImage(this)">&#10005;</button>';

            pasteZone.appendChild(item);
        }

        // Remove a single image
        function removeImage(btn) {
            const item = btn.closest('.image-preview-item');
            if (!item) return;

            const idx = parseInt(item.dataset.index);
            item.style.transition = 'all 0.3s ease';
            item.style.opacity = '0';
            item.style.transform = 'scale(0.8)';

            setTimeout(function() {
                item.remove();
                // Remove from code snippets
                codeSnippets[idx] = null;
                updateCodeOutput();

                // Show hint if empty
                if (pasteZone.querySelectorAll('.image-preview-item').length === 0) {
                    if (pasteHint) pasteHint.style.display = '';
                }
            }, 300);
        }

        // Update the code textarea on the right
        function updateCodeOutput() {
            const activeCode = codeSnippets.filter(function(c) { return c !== null; });
            codeOutput.value = activeCode.join('\n\n');
        }

        // Clear everything
        function clearAll() {
            pasteZone.querySelectorAll('.image-preview-item').forEach(function(el) { el.remove(); });
            codeSnippets = [];
            codeOutput.value = '';
            if (pasteHint) pasteHint.style.display = '';
        }

        // Auto-focus the paste zone on load
        pasteZone.focus();
    </script>
</body>
</html>
